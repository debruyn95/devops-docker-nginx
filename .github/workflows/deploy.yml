name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: SSH into server and deploy
        uses: appleboy/ssh-action@master
        with:
          host: 192.168.127.132
          username: debruyn
          password: superman1995
          script: |
            cd ~/myapp
            git pull
            docker stop mywebsite || true
            docker rm mywebsite || true
            docker run -d \
              --name mywebsite \
              -p 8080:80 \
              -v ~/myapp:/usr/share/nginx/html \
              nginx